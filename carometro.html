<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTEu6XYfBX6dLECkxfarfPyb2WfE9KQSWr1B8WeCshx2w&s">
    <title>Carômetro Firmo de Mattos</title>
    
    <!-- Dependências -->
    <link rel="stylesheet" href="all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        body { background-color: #f3f4f6; min-height: 100vh; color: #1f2937; }
        .hidden { display: none !important; }
        .flex-center-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .card-selecao { background-color: #ffffff; padding: 2rem; border-radius: 0.75rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 28rem; border: 1px solid #e5e7eb; }
        .titulo-principal { font-size: 1.5rem; font-weight: 700; text-align: center; color: #1e3a8a; margin-bottom: 1.5rem; }
        .label-form { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        .select-custom { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; outline: none; font-size: 1rem; margin-bottom: 1rem; }
        .btn-primary { width: 100%; background-color: #2563eb; color: #ffffff; font-weight: 700; padding: 0.75rem; border-radius: 0.5rem; border: none; cursor: pointer; }
        
        /* Estilos do Carômetro (Métricas, Grids, etc) */
        .header-carometro { background-color: #1e3a8a; color: #ffffff; padding: 1.5rem; }
        .main-content { max-width: 80rem; margin: 0 auto; padding: 1.5rem; }
        .grid-alunos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .card-aluno { background: #fff; padding: 1rem; border-radius: 0.75rem; border: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; min-height: 280px; }
        .container-foto { width: 6rem; height: 6rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #3b82f6; overflow: hidden; margin-bottom: 0.75rem; }
        .foto-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-acao { width: 2rem; height: 2rem; border-radius: 50%; border: none; color: white; cursor: pointer; margin: 0 0.25rem; }
    </style>
</head>
<body>

    <!-- TELA DE SELEÇÃO -->
    <div id="tela-selecao" class="flex-center-container">
        <div class="card-selecao">
            <h2 class="titulo-principal">Configurar Carômetro</h2>
            
            <label class="label-form">1. Escolha o Ano/Etapa:</label>
            <select id="select-ano" class="select-custom" onchange="filtrarTurmasPorAno()">
                <option value="">-- Selecione o Ano --</option>
                <option value="3">3º Ano</option><option value="4">4º Ano</option><option value="5">5º Ano</option>
                <option value="6">6º Ano</option><option value="7">7º Ano</option><option value="8">8º Ano</option>
                <option value="9">9º Ano</option><option value="EJA">EJA</option>
            </select>

            <label class="label-form">2. Escolha a Turma:</label>
            <select id="select-turmas" class="select-custom">
                <option value="">Selecione um ano primeiro...</option>
            </select>

            <button onclick="entrarNaTurma()" class="btn-primary">Acessar Carômetro</button>
        </div>
    </div>

    <!-- TELA CARÔMETRO -->
    <div id="tela-carometro" class="hidden">
        <header class="header-carometro">
            <h1 id="titulo-turma">Carômetro</h1>
            <button onclick="voltarParaSelecao()">Voltar</button>
        </header>
        <main class="main-content">
            <div id="grid-alunos" class="grid-alunos"></div>
        </main>
    </div>

    <script>
    const SUPABASE_URL = "https://mzktaliyfwshlgqweyin.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16a3RhbGl5ZndzaGxncXdleWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTYyOTcsImV4cCI6MjA5OTE5MjI5N30.ALLgFwlyMJVkEwaMxjWhXLbOakweL6xlXzUOEalpzDM";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let todasAsTurmas = [];
    let alunoSelecionadoParaUpload = null;

    document.addEventListener("DOMContentLoaded", async () => {
        await carregarTurmas();
        configurarInputsDeArquivo();
    });

    async function carregarTurmas() {
        const { data, error } = await supabaseClient.from('carometro').select('class_name');
        if (error) return console.error("Erro ao carregar turmas:", error);
        todasAsTurmas = [...new Set(data.map(item => item.class_name).filter(Boolean))].sort();
    }

    function filtrarTurmasPorAno() {
        const ano = document.getElementById("select-ano").value;
        const selectTurmas = document.getElementById("select-turmas");
        selectTurmas.innerHTML = '<option value="">-- Escolha a Turma --</option>';
        
        const filtradas = todasAsTurmas.filter(t => 
            ano === "EJA" ? t.toUpperCase().includes("EJA") : t.startsWith(ano)
        );
        
        filtradas.forEach(t => {
            let opt = document.createElement("option");
            opt.value = t; opt.textContent = t;
            selectTurmas.appendChild(opt);
        });
    }

    function entrarNaTurma() {
        const turma = document.getElementById("select-turmas").value;
        if (!turma) return alert("Selecione uma turma primeiro!");
        
        document.getElementById("titulo-turma").innerText = `Carômetro - ${turma}`;
        document.getElementById("tela-selecao").classList.add("hidden");
        document.getElementById("tela-carometro").classList.remove("hidden");
        
        carregarAlunos(turma);
    }

    function voltarParaSelecao() {
        document.getElementById("tela-carometro").classList.add("hidden");
        document.getElementById("tela-selecao").classList.remove("hidden");
    }

   async function carregarAlunos(nomeTurma) {
    const { data: alunos, error } = await supabaseClient
        .from('carometro')
        .select('*')
        .eq('class_name', nomeTurma)
        .order('student_name');

    if (error) return alert("Erro ao carregar alunos: " + error.message);

    // --- CÁLCULO DAS MÉTRICAS ---
    const total = alunos.length;
    const comFoto = alunos.filter(a => a.photo_url).length;
    const semFoto = total - comFoto;

    document.getElementById("meta-total").innerText = total;
    document.getElementById("meta-com-foto").innerText = comFoto;
    document.getElementById("meta-sem-foto").innerText = semFoto;

    // --- MONTAGEM DO GRID ---
    const grid = document.getElementById("grid-alunos");
    grid.innerHTML = "";

    alunos.forEach(aluno => {
        const card = document.createElement("div");
        card.className = "card-aluno";

        // Define a foto
        let areaFoto = aluno.photo_url 
            ? `<div class="container-foto foto-preenchida"><img src="${aluno.photo_url}" class="foto-img"></div>`
            : `<div class="container-foto foto-vazia"><i class="fa-solid fa-user icon-user-vazio"></i></div>`;

        // Define os botões de ação
        let botoesAcao = aluno.photo_url 
            ? `<button onclick="window.open('${aluno.photo_url}', '_blank')" class="btn-acao bg-green-600"><i class="fa-solid fa-magnifying-glass"></i></button>
               <button onclick="removerFoto('${aluno.id}')" class="btn-acao bg-red-500"><i class="fa-solid fa-trash"></i></button>`
            : `<button onclick="dispararUpload('${aluno.id}', 'camera')" class="btn-acao bg-purple-600"><i class="fa-solid fa-camera"></i></button>
               <button onclick="dispararUpload('${aluno.id}', 'galeria')" class="btn-acao bg-blue-500"><i class="fa-solid fa-image"></i></button>`;

        card.innerHTML = `
            <div class="flex-col w-full" style="display: flex; align-items: center;">
                ${areaFoto}
                <h4 class="nome-aluno">${aluno.student_name}</h4>
            </div>
            <div class="acoes-container">
                ${botoesAcao}
                <button onclick="abrirModalEdicao('${aluno.id}', '${aluno.student_name}', '${aluno.class_name}')" class="btn-acao bg-cyan-500"><i class="fa-solid fa-pen"></i></button>
            </div>`;
        grid.appendChild(card);
    });
}

    function configurarInputsDeArquivo() {
        // Mantenha aqui a sua função de upload que já funcionava
    }
</script>
</body>
</html>
