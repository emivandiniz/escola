<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <<link rel="icon" type="image/x-icon" href="logo.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Ivan Diniz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <!-- TELA DE SELEÇÃO -->
    <div id="tela-selecao" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-200">
            <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">Carômetro Firmo de Mattos</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">1. Escolha o Ano:</label>
                <select id="select-ano" class="w-full p-3 border rounded-lg" onchange="carregarTurmasPorAno()">
                    <option value="">Selecione o ano...</option>
                    <option value="3">3º Ano</option>
                    <option value="4">4º Ano</option>
                    <option value="5">5º Ano</option>
                    <option value="6">6º Ano</option>
                    <option value="7">7º Ano</option>
                    <option value="8">8º Ano</option>
                    <option value="9">9º Ano</option>
                    <option value="EJA">EJA</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2">2. Escolha a Turma:</label>
                <select id="select-turmas" class="w-full p-3 border rounded-lg" disabled>
                    <option value="">Selecione o ano primeiro...</option>
                </select>
            </div>

            <button id="btn-acessar" onclick="entrarNaTurma()" disabled class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg opacity-50 cursor-not-allowed transition">
                Acessar Carômetro
            </button>
        </div>
    </div>

    <!-- LOADER -->
    <div id="loader" class="hidden fixed inset-0 bg-black/30 flex items-center justify-center z-[100]">
        <div class="bg-white p-5 rounded-lg flex items-center gap-3">
            <i class="fa-solid fa-spinner fa-spin text-blue-600 text-2xl"></i>
            <span class="font-bold">Carregando...</span>
        </div>
    </div>

    <!-- TELA DO CARÔMETRO -->
    <div id="tela-carometro" class="hidden">
        <header class="bg-blue-900 text-white p-6 shadow-md">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 id="titulo-turma" class="text-2xl font-bold">Carômetro</h1>
                </div>
                <button onclick="voltarParaSelecao()" class="bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded shadow transition font-semibold text-sm">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-center">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p id="meta-total" class="text-3xl font-bold text-blue-900">0</p>
                    <p class="text-xs font-semibold text-gray-500 uppercase">Total</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p id="meta-com-foto" class="text-3xl font-bold text-green-600">0</p>
                    <p class="text-xs font-semibold text-gray-500 uppercase">Com Foto</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p id="meta-sem-foto" class="text-3xl font-bold text-amber-500">0</p>
                    <p class="text-xs font-semibold text-gray-500 uppercase">Sem Foto</p>
                </div>
            </div>
            <div id="grid-alunos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <!-- INPUTS E MODAIS -->
    <input type="file" id="input-camera" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="input-galeria" accept="image/*" class="hidden">

    <div id="modal-edicao" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">Editar Aluno</h3>
            <input type="hidden" id="edit-aluno-id">
            <div class="space-y-4">
                <input type="text" id="edit-nome" class="w-full p-2 border rounded-lg">
                <input type="text" id="edit-turma" class="w-full p-2 border rounded-lg">
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="fecharModal()" class="px-4 py-2 bg-gray-200 rounded-lg">Cancelar</button>
                <button onclick="salvarEdicaoAluno()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mzktaliyfwshlgqweyin.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16a3RhbGl5ZndzaGxncXdleWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTYyOTcsImV4cCI6MjA5OTE5MjI5N30.ALLgFwlyMJVkEwaMxjWhXLbOakweL6xlXzUOEalpzDM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let alunoSelecionadoParaUpload = null;

        document.addEventListener("DOMContentLoaded", () => {
            configurarInputsDeArquivo();
        });

        function toggleLoader(mostrar) {
            document.getElementById("loader").classList.toggle("hidden", !mostrar);
        }

        async function carregarTurmasPorAno() {
            const ano = document.getElementById("select-ano").value;
            const selectTurmas = document.getElementById("select-turmas");
            const btnAcessar = document.getElementById("btn-acessar");

            if (!ano) {
                selectTurmas.disabled = true;
                btnAcessar.disabled = true;
                btnAcessar.classList.add("opacity-50");
                return;
            }

            toggleLoader(true);
            const { data, error } = await supabaseClient.from('carometro').select('class_name');
            
            if (error) {
                toggleLoader(false);
                return alert("Erro ao buscar turmas: " + error.message);
            }

            const turmas = [...new Set(data.map(i => i.class_name))].filter(t => 
                ano === "EJA" ? t.toLowerCase().includes("eja") : t.startsWith(ano)
            ).sort();

            selectTurmas.innerHTML = '<option value="">Selecione a turma...</option>';
            turmas.forEach(t => selectTurmas.innerHTML += `<option value="${t}">${t}</option>`);

            selectTurmas.disabled = false;
            btnAcessar.disabled = false;
            btnAcessar.classList.remove("opacity-50");
            toggleLoader(false);
        }

        function entrarNaTurma() {
            const nomeTurma = document.getElementById("select-turmas").value;
            toggleLoader(true);
            document.getElementById("titulo-turma").innerText = `Carômetro - ${nomeTurma}`;
            document.getElementById("tela-selecao").classList.add("hidden");
            document.getElementById("tela-carometro").classList.remove("hidden");
            carregarAlunos(nomeTurma).finally(() => toggleLoader(false));
        }

        function voltarParaSelecao() {
            document.getElementById("tela-carometro").classList.add("hidden");
            document.getElementById("tela-selecao").classList.remove("hidden");
            document.getElementById("select-ano").value = "";
            document.getElementById("select-turmas").innerHTML = '<option value="">Selecione o ano primeiro...</option>';
            document.getElementById("select-turmas").disabled = true;
            document.getElementById("btn-acessar").disabled = true;
            document.getElementById("btn-acessar").classList.add("opacity-50");
        }

        async function carregarAlunos(nomeTurma) {
            const { data: alunos } = await supabaseClient.from('carometro').select('*').eq('class_name', nomeTurma).order('student_name');
            const grid = document.getElementById("grid-alunos");
            grid.innerHTML = "";
            
            document.getElementById("meta-total").innerText = alunos.length;
            document.getElementById("meta-com-foto").innerText = alunos.filter(a => a.photo_url).length;
            document.getElementById("meta-sem-foto").innerText = alunos.filter(a => !a.photo_url).length;

            alunos.forEach(aluno => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col items-center";
                let img = aluno.photo_url ? `<img src="${aluno.photo_url}?t=${Date.now()}" class="w-24 h-24 rounded-full border-2 border-blue-500 object-cover mb-3">` : `<div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center mb-3"><i class="fa-solid fa-user text-4xl text-gray-400"></i></div>`;
                
                card.innerHTML = `
                    ${img}
                    <h4 class="font-bold text-sm text-center">${aluno.student_name}</h4>
                    <div class="flex gap-2 mt-4">
                        ${aluno.photo_url ? `<button onclick="window.open('${aluno.photo_url}','_blank')" class="w-8 h-8 rounded-full bg-green-600 text-white"><i class="fa-solid fa-magnifying-glass"></i></button><button onclick="removerFoto('${aluno.id}')" class="w-8 h-8 rounded-full bg-red-500 text-white"><i class="fa-solid fa-trash"></i></button>` : `<button onclick="dispararUpload('${aluno.id}', 'camera')" class="w-8 h-8 rounded-full bg-purple-600 text-white"><i class="fa-solid fa-camera"></i></button><button onclick="dispararUpload('${aluno.id}', 'galeria')" class="w-8 h-8 rounded-full bg-blue-500 text-white"><i class="fa-solid fa-image"></i></button>`}
                        <button onclick="abrirModalEdicao('${aluno.id}', '${aluno.student_name}', '${aluno.class_name}')" class="w-8 h-8 rounded-full bg-cyan-500 text-white"><i class="fa-solid fa-pen"></i></button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function dispararUpload(id, origem) { alunoSelecionadoParaUpload = id; origem === 'camera' ? document.getElementById("input-camera").click() : document.getElementById("input-galeria").click(); }

        function configurarInputsDeArquivo() {
            const processar = async (e) => {
                const file = e.target.files[0];
                new Compressor(file, { quality: 0.6, maxWidth: 800, success: async (res) => {
                    const path = `public/${alunoSelecionadoParaUpload}-${Date.now()}.jpg`;
                    await supabaseClient.storage.from('fotos-alunos').upload(path, res);
                    const { data: { publicUrl } } = supabaseClient.storage.from('fotos-alunos').getPublicUrl(path);
                    await supabaseClient.from('carometro').update({ photo_url: publicUrl }).eq('id', alunoSelecionadoParaUpload);
                    carregarAlunos(document.getElementById("select-turmas").value);
                }});
            };
            document.getElementById("input-camera").addEventListener("change", processar);
            document.getElementById("input-galeria").addEventListener("change", processar);
        }

        async function removerFoto(id) {
            if (!confirm("Remover foto?")) return;
            const { data: aluno } = await supabaseClient.from('carometro').select('photo_url').eq('id', id).single();
            if (aluno.photo_url) await supabaseClient.storage.from('fotos-alunos').remove([aluno.photo_url.split('/fotos-alunos/')[1]]);
            await supabaseClient.from('carometro').update({ photo_url: null }).eq('id', id);
            carregarAlunos(document.getElementById("select-turmas").value);
        }

        function abrirModalEdicao(id, nome, turma) {
            document.getElementById("edit-aluno-id").value = id;
            document.getElementById("edit-nome").value = nome;
            document.getElementById("edit-turma").value = turma;
            document.getElementById("modal-edicao").classList.remove("hidden");
        }

        function fecharModal() { document.getElementById("modal-edicao").classList.add("hidden"); }

        async function salvarEdicaoAluno() {
            const id = document.getElementById("edit-aluno-id").value;
            await supabaseClient.from('carometro').update({ student_name: document.getElementById("edit-nome").value, class_name: document.getElementById("edit-turma").value }).eq('id', id);
            fecharModal();
            carregarAlunos(document.getElementById("select-turmas").value);
        }
    </script>
</body>
</html>
