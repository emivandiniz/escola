<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="logo.jpg">
<title>Angenda Ivan Diniz</title>
<style>
    *{
        box-sizing: border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    body{
        background: #f3f5f9;
        margin: 0;
        padding: 15px;
    }

    .container{
        max-width: 800px;
        margin: auto;
        padding-top: 15px;
    }

    h1{
        text-align: center;
        color: #1f2937;
        margin-bottom: 25px;
        font-size: 1.8rem;
    }

    .menu{
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 2px solid #e5e7eb;
        padding-bottom: 10px;
    }

    .menu button{
        flex: 1;
        border: none;
        background: #e5e7eb;
        color: #4b5563;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        transition: all 0.2s ease;
    }

    .menu button.active {
        background: #2563eb;
        color: white;
    }

    .busca{
        position: relative;
        display: flex;
        align-items: center;
    }

    input{
        width: 100%;
        padding: 15px;
        padding-right: 45px; /* Espaço para o botão X não ficar em cima do texto */
        border: 2px solid transparent;
        border-radius: 12px;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,.05);
        outline: none;
        transition: border 0.2s;
    }

    input:focus {
        border-color: #2563eb;
    }

    /* Botão de Limpar (X) */
    .btn-limpar {
        position: absolute;
        right: 15px;
        background: #e5e7eb;
        color: #6b7280;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        display: none; /* Escondido por padrão */
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }

    .btn-limpar:hover {
        background: #d1d5db;
        color: #1f2937;
    }

    .autocomplete{
        position: absolute;
        width: 100%;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        top: 100%;
        margin-top: 5px;
        box-shadow: 0 5px 15px rgba(0,0,0,.15);
        z-index: 999;
    }

    .item{
        padding: 12px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }

    .item:last-child {
        border-bottom: none;
    }

    .item:hover{
        background: #f0f4ff;
    }

    .nome{
        font-weight: bold;
        color: #1f2937;
    }

    .turma{
        color: #6b7280;
        font-size: 14px;
    }

    .card{
        background: white;
        margin-top: 20px;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .linha{
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #f3f4f6;
    }
    
    .linha:last-child {
        border-bottom: none;
        margin-bottom: 0;
    }

    .titulo{
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 4px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    ul{
        margin-top: 8px;
        padding-left: 20px;
    }

    li{
        margin-bottom: 5px;
        color: #374151;
    }

    .card-aniversariante {
        background: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,.05);
        border-left: 4px solid #f43f5e;
    }

    .card-aniversariante h3 {
        margin: 0 0 5px 0;
        color: #1f2937;
        font-size: 16px;
    }

    .card-aniversariante p {
        margin: 3px 0;
        color: #4b5563;
        font-size: 14px;
    }

    .sem-dados {
        text-align: center;
        color: #6b7280;
        padding: 20px;
    }

    @media (max-width: 480px) {
        body { padding: 10px; }
        h1 { font-size: 1.5rem; }
        .menu button { padding: 10px 12px; font-size: 14px; }
    }
</style>
</head>
<body>

<div class="container">

    <h1>📚 Agenda Telefônica Escolar</h1>

    <div class="menu">
        <button id="btnBusca" class="active" onclick="trocarAba('busca')">🔍 Contatos</button>
        <button id="btnAniversarios" onclick="trocarAba('aniversarios')">🎂 Aniversariantes da Semana</button>
    </div>

    <div id="painelBusca">
        <div class="busca">
            <input
                type="text"
                id="pesquisa"
                placeholder="Digite o nome do aluno..."
                autocomplete="off">
            <!-- Novo botão de limpar -->
            <button id="btnLimpar" class="btn-limpar" onclick="limparBusca()">✕</button>

            <div id="lista" class="autocomplete"></div>
        </div>

        <div id="card" class="card" style="display:none;"></div>
    </div>

    <div id="painelAniversarios" style="display:none;">
        <div id="listaAniversarios"></div>
    </div>

</div>

<script>

let alunos = [];

fetch("contato.json")
.then(r => r.json())
.then(dados=>{
    alunos = dados;
}).catch(err => console.error("Erro ao carregar contato.json:", err));

const pesquisa = document.getElementById("pesquisa");
const lista = document.getElementById("lista");
const card = document.getElementById("card");
const btnLimpar = document.getElementById("btnLimpar");

function trocarAba(aba) {
    if (aba === 'busca') {
        document.getElementById("painelBusca").style.display = "block";
        document.getElementById("painelAniversarios").style.display = "none";
        document.getElementById("btnBusca").classList.add("active");
        document.getElementById("btnAniversarios").classList.remove("active");
    } else {
        document.getElementById("painelBusca").style.display = "none";
        document.getElementById("painelAniversarios").style.display = "block";
        document.getElementById("btnBusca").classList.remove("active");
        document.getElementById("btnAniversarios").classList.add("active");
        mostrarAniversariantes();
    }
}

// Controla a digitação e a exibição do botão "X"
pesquisa.addEventListener("input", ()=>{
    const texto = pesquisa.value.trim().toUpperCase();
    lista.innerHTML = "";

    // Se tiver texto, mostra o botão X. Se não, esconde.
    if (pesquisa.value.length > 0) {
        btnLimpar.style.display = "flex";
    } else {
        btnLimpar.style.display = "none";
    }

    if(texto.length < 2) return;

    const encontrados = alunos
        .filter(a => a.nome && a.nome.toUpperCase().includes(texto))
        .slice(0, 8);

    encontrados.forEach(aluno=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
            <div class="nome">${aluno.nome}</div>
            <div class="turma">Turma ${aluno.turma || 'Não informada'}</div>
        `;

        div.onclick = ()=>{
            mostrarAluno(aluno);
            lista.innerHTML = "";
            pesquisa.value = aluno.nome;
        };

        lista.appendChild(div);
    });
});

// Nova Função para limpar tudo
function limparBusca() {
    pesquisa.value = "";
    lista.innerHTML = "";
    card.innerHTML = "";
    card.style.display = "none";
    btnLimpar.style.display = "none";
    pesquisa.focus(); // Devolve o foco para o teclado do usuário
}

function mostrarAluno(aluno){
    const outros = [];

    Object.keys(aluno).forEach(chave => {
        const nome = chave.toLowerCase();
        if (nome.includes("contato") || nome.includes("outro") || nome.includes("field")) {
            const valor = aluno[chave];
            if (valor && valor.trim() !== "") {
                outros.push(valor);
            }
        }
    });

    let listaOutros = "";
    if(outros.length){
        listaOutros = `
            <div class="linha">
                <div class="titulo">Outros contatos</div>
                <ul>
                    ${outros.map(c=>`<li>${c}</li>`).join("")}
                </ul>
            </div>
        `;
    }

    card.innerHTML = `
        <div class="linha">
            <div class="titulo">Aluno</div>
            ${aluno.nome}
        </div>
        <div class="linha">
            <div class="titulo">Turma</div>
            ${aluno.turma || "-"}
        </div>
        <div class="linha">
            <div class="titulo">Filiação 1</div>
            ${aluno.filiação1 || "-"}<br>
            📞 ${aluno.telefone || "-"}
        </div>
        <div class="linha">
            <div class="titulo">Filiação 2</div>
            ${aluno.filiação2 || "-"}
        </div>
        ${listaOutros}
    `;
    card.style.display = "block";
}

document.addEventListener("click", e=>{
    if(!lista.contains(e.target) && e.target !== pesquisa && e.target !== btnLimpar){
        lista.innerHTML = "";
    }
});

function mostrarAniversariantes(){
    const div = document.getElementById("listaAniversarios");
    div.innerHTML = "";

    const hoje = new Date();
    const diaDaSemana = hoje.getDay(); 
    const inicioSemana = new Date(hoje);
    inicioSemana.setDate(hoje.getDate() - diaDaSemana);
    
    const fimSemana = new Date(inicioSemana);
    fimSemana.setDate(inicioSemana.getDate() + 6);

    const aniversariantes = alunos.filter(a=>{
        if(!a.nascimento) return false;

        const partes = a.nascimento.split("/");
        const diaNasc = parseInt(partes[0], 10);
        const mesNasc = parseInt(partes[1], 10) - 1;

        const dataNascEsteAno = new Date(hoje.getFullYear(), mesNasc, diaNasc);

        inicioSemana.setHours(0,0,0,0);
        fimSemana.setHours(23,59,59,999);
        dataNascEsteAno.setHours(12,0,0,0); 

        return dataNascEsteAno >= inicioSemana && dataNascEsteAno <= fimSemana;
    });

    if(aniversariantes.length === 0){
        div.innerHTML = "<div class='sem-dados'><p>Nenhum aniversariante nesta semana. 📅</p></div>";
        return;
    }

    div.innerHTML = aniversariantes.map(a=>`
        <div class="card-aniversariante">
            <h3>🎉 ${a.nome}</h3>
            <p><strong>Turma:</strong> ${a.turma || 'Não informada'}</p>
            <p><strong>Data:</strong> ${a.nascimento.substring(0,5)}</p>
        </div>
    `).join("");
}
</script>

</body>
</html>
