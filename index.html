<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://instagram.fplu19-1.fna.fbcdn.net/v/t51.2885-19/272720093_1090146071779369_4582633647642433945_n.jpg?stp=dst-jpg_s320x320_tt6&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby40MTkuYzIifQ&_nc_ht=instagram.fplu19-1.fna.fbcdn.net&_nc_cat=101&_nc_oc=Q6cZ2gHKyN-tJqF1GcSAQJ0t-NxTpbg7AoLGb0gPElm39Xh5rEMbSwl6OtNBJHDRxpG_JhQWfRTBPNGeTzFA9RrZondW&_nc_ohc=04SMBwwZxX8Q7kNvwFLocax&_nc_gid=pTk3lSsoQqVFQSOpDoAMIA&edm=AOQ1c0wBAAAA&ccb=7-5&oh=00_AQBn_9Y7VV94oQ-B49lE61VHwdfnpyyNx5tBuu7nlFCP2w&oe=6A55C139&_nc_sid=8b3546">
<title>Angenda Ivan Diniz</title>

<style>
    *{
        box-sizing: border-box;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    body{
        background: #f3f5f9;
        margin: 0;
        padding: 15px; /* Reduzido para telas menores */
    }

    .container{
        max-width: 800px;
        margin: auto;
        padding-top: 15px;
    }

    h1{
        text-align: center;
        color: #1f2937;
        margin-bottom: 25px;
        font-size: 1.8rem;
    }

    /* Abas Estilizadas */
    .menu{
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 2px solid #e5e7eb;
        padding-bottom: 10px;
    }

    .menu button{
        flex: 1; /* Faz os botões ocuparem espaço igual no celular */
        border: none;
        background: #e5e7eb;
        color: #4b5563;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        transition: all 0.2s ease;
    }

    .menu button.active {
        background: #2563eb;
        color: white;
    }

    .busca{
        position: relative;
    }

    input{
        width: 100%;
        padding: 15px;
        border: 2px solid transparent;
        border-radius: 12px;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,.05);
        outline: none;
        transition: border 0.2s;
    }

    input:focus {
        border-color: #2563eb;
    }

    .autocomplete{
        position: absolute;
        width: 100%;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        margin-top: 5px;
        box-shadow: 0 5px 15px rgba(0,0,0,.15);
        z-index: 999;
    }

    .item{
        padding: 12px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }

    .item:last-child {
        border-bottom: none;
    }

    .item:hover{
        background: #f0f4ff;
    }

    .nome{
        font-weight: bold;
        color: #1f2937;
    }

    .turma{
        color: #6b7280;
        font-size: 14px;
    }

    .card{
        background: white;
        margin-top: 20px;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .linha{
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #f3f4f6;
    }
    
    .linha:last-child {
        border-bottom: none;
        margin-bottom: 0;
    }

    .titulo{
        font-weight: bold;
        color: #2563eb;
        margin-bottom: 4px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    ul{
        margin-top: 8px;
        padding-left: 20px;
    }

    li{
        margin-bottom: 5px;
        color: #374151;
    }

    /* Estilos para a lista de aniversários */
    .card-aniversariante {
        background: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,.05);
        border-left: 4px solid #f43f5e;
    }

    .card-aniversariante h3 {
        margin: 0 0 5px 0;
        color: #1f2937;
        font-size: 16px;
    }

    .card-aniversariante p {
        margin: 3px 0;
        color: #4b5563;
        font-size: 14px;
    }

    .sem-dados {
        text-align: center;
        color: #6b7280;
        padding: 20px;
    }

    /* Media Query para Responsividade em telas bem pequenas */
    @media (max-width: 480px) {
        body { padding: 10px; }
        h1 { font-size: 1.5rem; }
        .menu button { padding: 10px 12px; font-size: 14px; }
    }
</style>
</head>
<body>

<div class="container">

    <h1>📚 Agenda Telefônica Escolar</h1>

    <!-- Abas de Navegação -->
    <div class="menu">
        <button id="btnBusca" class="active" onclick="trocarAba('busca')">🔍 Contatos</button>
        <button id="btnAniversarios" onclick="trocarAba('aniversarios')">🎂 Aniversariantes da Semana</button>
    </div>

    <!-- Conteúdo da Aba 1: Busca e Agenda -->
    <div id="painelBusca">
        <div class="busca">
            <input
                type="text"
                id="pesquisa"
                placeholder="Digite o nome do aluno..."
                autocomplete="off">

            <div id="lista" class="autocomplete"></div>
        </div>

        <div id="card" class="card" style="display:none;"></div>
    </div>

    <!-- Conteúdo da Aba 2: Aniversariantes -->
    <div id="painelAniversarios" style="display:none;">
        <div id="listaAniversarios"></div>
    </div>

</div>

<script>

let alunos = [];

// Carrega os dados do arquivo JSON
fetch("contato.json")
.then(r => r.json())
.then(dados=>{
    alunos = dados;
}).catch(err => console.error("Erro ao carregar contato.json:", err));

const pesquisa = document.getElementById("pesquisa");
const lista = document.getElementById("lista");
const card = document.getElementById("card");

// Controle de troca de Abas
function trocarAba(aba) {
    if (aba === 'busca') {
        document.getElementById("painelBusca").style.display = "block";
        document.getElementById("painelAniversarios").style.display = "none";
        document.getElementById("btnBusca").classList.add("active");
        document.getElementById("btnAniversarios").classList.remove("active");
    } else {
        document.getElementById("painelBusca").style.display = "none";
        document.getElementById("painelAniversarios").style.display = "block";
        document.getElementById("btnBusca").classList.remove("active");
        document.getElementById("btnAniversarios").classList.add("active");
        mostrarAniversariantes();
    }
}

// Evento de Input no campo de busca
pesquisa.addEventListener("input", ()=>{
    const texto = pesquisa.value.trim().toUpperCase();
    lista.innerHTML = "";

    if(texto.length < 2) return;

    // Filtra e limita rigorosamente a 8 resultados
    const encontrados = alunos
        .filter(a => a.nome && a.nome.toUpperCase().includes(texto))
        .slice(0, 8);

    encontrados.forEach(aluno=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
            <div class="nome">${aluno.nome}</div>
            <div class="turma">Turma ${aluno.turma || 'Não informada'}</div>
        `;

        div.onclick = ()=>{
            mostrarAluno(aluno);
            lista.innerHTML = "";
            pesquisa.value = aluno.nome;
        };

        lista.appendChild(div);
    });
});

// Renderiza as informações detalhadas do Aluno
function mostrarAluno(aluno){
    const outros = [];

    Object.keys(aluno).forEach(chave => {
        const nome = chave.toLowerCase();
        if (nome.includes("contato") || nome.includes("outro") || nome.includes("field")) {
            const valor = aluno[chave];
            if (valor && valor.trim() !== "") {
                outros.push(valor);
            }
        }
    });

    let listaOutros = "";
    if(outros.length){
        listaOutros = `
            <div class="linha">
                <div class="titulo">Outros contatos</div>
                <ul>
                    ${outros.map(c=>`<li>${c}</li>`).join("")}
                </ul>
            </div>
        `;
    }

    card.innerHTML = `
        <div class="linha">
            <div class="titulo">Aluno</div>
            ${aluno.nome}
        </div>
        <div class="linha">
            <div class="titulo">Turma</div>
            ${aluno.turma || "-"}
        </div>
        <div class="linha">
            <div class="titulo">Filiação 1</div>
            ${aluno.filiação1 || "-"}<br>
            📞 ${aluno.telefone || "-"}
        </div>
        <div class="linha">
            <div class="titulo">Filiação 2</div>
            ${aluno.filiação2 || "-"}
        </div>
        ${listaOutros}
    `;
    card.style.display = "block";
}

// Fecha a lista de autocomplete se clicar fora dela
document.addEventListener("click", e=>{
    if(!lista.contains(e.target) && e.target !== pesquisa){
        lista.innerHTML = "";
    }
});

// Função para buscar aniversariantes da SEMANA CORRENTE (de domingo a sábado)
function mostrarAniversariantes(){
    const div = document.getElementById("listaAniversarios");
    div.innerHTML = "";

    const hoje = new Date();
    
    // Calcula o início (domingo) e fim (sábado) da semana atual
    const diaDaSemana = hoje.getDay(); 
    const inicioSemana = new Date(hoje);
    inicioSemana.setDate(hoje.getDate() - diaDaSemana);
    
    const fimSemana = new Date(inicioSemana);
    fimSemana.setDate(inicioSemana.getDate() + 6);

    // Filtra os alunos que fazem aniversário nessa janela de dias/meses
    const aniversariantes = alunos.filter(a=>{
        if(!a.nascimento) return false;

        // Formato esperado do JSON: "DD/MM/AAAA" ou "DD/MM"
        const partes = a.nascimento.split("/");
        const diaNasc = parseInt(partes[0], 10);
        const mesNasc = parseInt(partes[1], 10) - 1; // Meses no JS vão de 0 a 11

        // Cria uma data fictícia no ano atual para validar o período da semana
        const dataNascEsteAno = new Date(hoje.getFullYear(), mesNasc, diaNasc);

        // Zera as horas para comparar apenas os dias estruturalmente
        inicioSemana.setHours(0,0,0,0);
        fimSemana.setHours(23,59,59,999);
        dataNascEsteAno.setHours(12,0,0,0); 

        return dataNascEsteAno >= inicioSemana && dataNascEsteAno <= fimSemana;
    });

    if(aniversariantes.length === 0){
        div.innerHTML = "<div class='sem-dados'><p>Nenhum aniversariante nesta semana. 📅</p></div>";
        return;
    }

    // Renderiza a lista formatada
    div.innerHTML = aniversariantes.map(a=>`
        <div class="card-aniversariante">
            <h3>🎉 ${a.nome}</h3>
            <p><strong>Turma:</strong> ${a.turma || 'Não informada'}</p>
            <p><strong>Data:</strong> ${a.nascimento.substring(0,5)}</p>
        </div>
    `).join("");
}
</script>

</body>
</html>
