<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Escolar</title>

<style>
    *{
        box-sizing:border-box;
        font-family:Segoe UI, Arial, sans-serif;
    }

    body{
        background:#f3f5f9;
        margin:0;
        padding:30px;
    }

    .container{
        max-width:800px;
        margin:auto;
    }

    h1{
        text-align:center;
        color:#1f2937;
        margin-bottom:30px;
    }

    .busca{
        position:relative;
    }

    input{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        font-size:16px;
        box-shadow:0 2px 8px rgba(0,0,0,.1);
    }

    .autocomplete{
        position:absolute;
        width:100%;
        background:white;
        border-radius:12px;
        overflow:hidden;
        margin-top:5px;
        box-shadow:0 5px 15px rgba(0,0,0,.15);
        z-index:999;
    }

    .item{
        padding:12px;
        cursor:pointer;
        border-bottom:1px solid #eee;
    }

    .item:hover{
        background:#f0f4ff;
    }

    .nome{
        font-weight:bold;
    }

    .turma{
        color:#666;
        font-size:14px;
    }

    .card{
        background:white;
        margin-top:30px;
        padding:25px;
        border-radius:18px;
        box-shadow:0 5px 20px rgba(0,0,0,.1);
        display:none;
    }

    .linha{
        margin-bottom:15px;
    }

    .titulo{
        font-weight:bold;
        color:#2563eb;
    }

    ul{
        margin-top:8px;
        padding-left:20px;
    }

    li{
        margin-bottom:5px;
    }
</style>
</head>
<body>

<div class="container">

    <h1>📚 Agenda Telefônica Escolar</h1>

    <div class="busca">
        <input
            type="text"
            id="pesquisa"
            placeholder="Digite o nome do aluno..."
            autocomplete="off">

        <div id="lista" class="autocomplete"></div>
    </div>

    <div id="card" class="card"></div>

</div>

<script>

let alunos = [];

fetch("contato.json")
.then(r => r.json())
.then(dados=>{
    alunos = dados;
});

const pesquisa = document.getElementById("pesquisa");
const lista = document.getElementById("lista");
const card = document.getElementById("card");

pesquisa.addEventListener("input", ()=>{

    const texto = pesquisa.value
        .trim()
        .toUpperCase();

    lista.innerHTML = "";

    if(texto.length < 2) return;

    const encontrados = alunos
        .filter(a =>
            a.nome &&
            a.nome.toUpperCase().includes(texto)
        )
        .slice(0,10);

    encontrados.forEach(aluno=>{

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div class="nome">${aluno.nome}</div>
            <div class="turma">Turma ${aluno.turma}</div>
        `;

        div.onclick = ()=>{
            mostrarAluno(aluno);
            lista.innerHTML = "";
            pesquisa.value = aluno.nome;
        };

        lista.appendChild(div);
    });

});

function mostrarAluno(aluno){

    const outros = [];

Object.keys(aluno).forEach(chave => {
    const nome = chave.toLowerCase();

    if (
        nome.includes("contato") ||
        nome.includes("outro") ||
        nome.includes("field")
    ) {
        const valor = aluno[chave];

        if (valor && valor.trim() !== "") {
            outros.push(valor);
        }
    }
});

    let listaOutros = "";

    if(outros.length){

        listaOutros = `
            <div class="linha">
                <div class="titulo">Outros contatos</div>
                <ul>
                    ${
                        outros
                        .map(c=>`<li>${c}</li>`)
                        .join("")
                    }
                </ul>
            </div>
        `;
    }

    card.innerHTML = `

        <div class="linha">
            <div class="titulo">Aluno</div>
            ${aluno.nome}
        </div>

        <div class="linha">
            <div class="titulo">Turma</div>
            ${aluno.turma}
        </div>

        <div class="linha">
            <div class="titulo">Filiação 1</div>
            ${aluno.filiação1 || "-"}<br>
            📞 ${aluno.telefone || "-"}
        </div>

        <div class="linha">
            <div class="titulo">Filiação 2</div>
            ${aluno.filiação2 || "-"}
        </div>

        ${listaOutros}
    `;

    card.style.display = "block";
}

document.addEventListener("click", e=>{
    if(!lista.contains(e.target) &&
       e.target !== pesquisa){
        lista.innerHTML = "";
    }
});

</script>

</body>
</html>
